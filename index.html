<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N25 Projector</title>
    <!-- Load ml-matrix for Least Squares Regression -->
    <script src="https://cdn.jsdelivr.net/npm/ml-matrix@6.11.1/matrix.umd.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1, h2 { margin-top: 0; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        
        .btn-secondary {
            background-color: #10b981;
            margin-top: 10px;
        }
        .btn-secondary:hover { background-color: #059669; }
        
        .btn-source {
            background-color: #4b5563;
            margin-right: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .btn-source:hover { background-color: #374151; }
        
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #e5e7eb;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
        }
        #result-container {
            display: none;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }
        .source-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>

<!-- PROJECTOR SECTION -->
<div class="card">
    <h1>DNA PCA Projector</h1>
    
    <div class="form-group">
        <label for="sampleName">Sample Name:</label>
        <input type="text" id="sampleName" placeholder="Enter sample name">
    </div>

    <div class="form-group">
        <label for="dnaFile">Upload Raw DNA File (Ancestry, MyHeritage, 23andMe):</label>
        <input type="file" id="dnaFile" accept=".txt,.csv">
    </div>

    <button id="processBtn" onclick="processData()">Process & Project</button>

    <div id="status"></div>

    <div id="result-container">
        <label for="outputCoords">N25 Coordinates:</label>
        <textarea id="outputCoords" readonly></textarea>
        <button class="btn-secondary" onclick="copyToClipboard('outputCoords', this)">Copy Coordinates</button>
    </div>
</div>

<!-- SOURCE COORDINATES SECTION -->
<div class="card">
    <h2>Calculator Sources</h2>
    <p>Copy the reference populations to paste into the Vahaduo Source tab.</p>
    <div class="source-buttons">
        <button class="btn-source" onclick="fetchAndCopy('modern_only.csv', this)">Copy Modern Sources</button>
        <button class="btn-source" onclick="fetchAndCopy('non_modern_only.csv', this)">Copy Non-Modern Sources</button>
        <button class="btn-source" onclick="fetchAndCopy('my_calculator_source.csv', this)">Copy All Sources</button>
    </div>
</div>

<script>
    const { Matrix, inverse } = mlMatrix;

    // --- UTILITY FUNCTIONS ---
    
    // Fetch a file from the server and copy to clipboard
    async function fetchAndCopy(filename, button) {
        const originalText = button.textContent;
        button.textContent = "Fetching...";
        button.disabled = true;

        try {
            const response = await fetch(filename);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            
            await navigator.clipboard.writeText(text);
            button.textContent = "Copied!";
            button.style.backgroundColor = "#10b981"; // Turn green on success
        } catch (e) {
            alert(`Failed to fetch ${filename}: ${e.message}`);
            button.textContent = "Error";
            button.style.backgroundColor = "#ef4444"; // Turn red on error
        } finally {
            setTimeout(() => {
                button.textContent = originalText;
                button.disabled = false;
                button.style.backgroundColor = ""; // Reset color
            }, 2000);
        }
    }

    // Copy textarea content to clipboard
    function copyToClipboard(elementId, button) {
        const copyText = document.getElementById(elementId);
        copyText.select();
        copyText.setSelectionRange(0, 99999); // For mobile devices
        
        navigator.clipboard.writeText(copyText.value).then(() => {
            const originalText = button.textContent;
            button.textContent = "Copied!";
            setTimeout(() => button.textContent = originalText, 2000);
        }).catch(err => {
            alert("Failed to copy text: " + err);
        });
    }

    // --- PROJECTION LOGIC ---

    function logStatus(msg) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = 'block';
        statusDiv.textContent += msg + '\n';
        console.log(msg);
    }

    function clearStatus() {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = '';
        statusDiv.style.display = 'none';
        document.getElementById('result-container').style.display = 'none';
    }

    async function loadModel() {
        logStatus("1. Loading model from /my_lsq_data.txt...");
        try {
            const response = await fetch('my_lsq_data.txt');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const text = await response.text();
            
            const lines = text.split(/\r?\n/);
            const headers = lines[0].split('\t');
            
            // Find PC columns
            const pcIndices = [];
            headers.forEach((h, i) => {
                if (h.startsWith('PC')) pcIndices.push(i);
            });

            let eigscale = [];
            let eigvals = [];
            const modelSnps = new Map();

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split('\t');
                const id = cols[0];

                const pcs = pcIndices.map(idx => parseFloat(cols[idx]));

                if (id === 'EIGSCALE') {
                    eigscale = pcs;
                } else if (id === 'EIGVAL') {
                    eigvals = pcs;
                } else {
                    modelSnps.set(id, {
                        A1: cols[headers.indexOf('A1')],
                        A2: cols[headers.indexOf('A2')],
                        XMEAN: parseFloat(cols[headers.indexOf('XMEAN')]),
                        XFANCY: parseFloat(cols[headers.indexOf('XFANCY')]),
                        PCs: pcs
                    });
                }
            }
            
            logStatus(`   -> Model loaded. Found ${modelSnps.size} SNPs.`);
            return { modelSnps, eigscale, eigvals };
        } catch (e) {
            logStatus(`Error loading model: ${e.message}`);
            throw e;
        }
    }

    async function processData() {
        const fileInput = document.getElementById('dnaFile');
        const sampleName = document.getElementById('sampleName').value.trim() || 'Sample';
        const processBtn = document.getElementById('processBtn');

        if (!fileInput.files.length) {
            alert("Please select a DNA file first.");
            return;
        }

        clearStatus();
        processBtn.disabled = true;

        try {
            // Step 1: Load Model
            const { modelSnps, eigscale, eigvals } = await loadModel();

            // Step 2: Load and Parse DNA File
            logStatus(`2. Loading DNA data from ${fileInput.files[0].name}...`);
            const dnaText = await fileInput.files[0].text();
            const dnaLines = dnaText.split(/\r?\n/);
            
            // Detect Format
            let isMyHeritage = false, isAncestry = false, is23andMe = false;
            let delimiter = '\t';
            let dataStartIndex = 0;
            let headerTokens = [];

            for (let i = 0; i < dnaLines.length; i++) {
                let line = dnaLines[i].trim();
                if (!line || line.startsWith('#')) continue;
                
                let headerLine = line.replace(/"/g, '').toUpperCase();
                if (headerLine.includes('RESULT')) {
                    isMyHeritage = true;
                    delimiter = ',';
                    logStatus("   -> Detected MyHeritage format.");
                } else {
                    delimiter = '\t';
                    headerTokens = headerLine.split(delimiter);
                    if (headerTokens.length >= 5) {
                        isAncestry = true;
                        logStatus("   -> Detected AncestryDNA format.");
                    } else if (headerTokens.length === 4) {
                        is23andMe = true;
                        logStatus("   -> Detected 23andMe format.");
                    }
                }
                headerTokens = headerLine.split(delimiter);
                dataStartIndex = i + 1;
                break;
            }

            if (!isMyHeritage && !isAncestry && !is23andMe) {
                throw new Error("Unrecognized DNA file format.");
            }

            // Find column indices based on format
            let rsidIdx = 0, a1Idx = -1, a2Idx = -1, resultIdx = -1, genotypeIdx = -1;
            if (isMyHeritage) {
                rsidIdx = headerTokens.indexOf('RSID');
                resultIdx = headerTokens.indexOf('RESULT');
            } else if (isAncestry) {
                rsidIdx = 0; a1Idx = 3; a2Idx = 4;
            } else if (is23andMe) {
                rsidIdx = 0; genotypeIdx = 3;
            }

            logStatus("3. Intersecting SNPs and validating alleles...");
            const W = [];
            const Y = [];
            let validCount = 0;

            for (let i = dataStartIndex; i < dnaLines.length; i++) {
                let line = dnaLines[i].trim();
                if (!line) continue;
                
                let cols = line.replace(/"/g, '').split(delimiter);
                let rsid = cols[rsidIdx];
                let allele1 = '', allele2 = '';

                // Extract alleles based on format
                if (isMyHeritage) {
                    let res = cols[resultIdx];
                    if (!res || res.length !== 2 || res.includes('-')) continue;
                    allele1 = res[0]; allele2 = res[1];
                } else if (isAncestry) {
                    allele1 = cols[a1Idx]; allele2 = cols[a2Idx];
                } else if (is23andMe) {
                    let gt = cols[genotypeIdx];
                    if (!gt || gt.length !== 2 || gt.includes('-')) continue;
                    allele1 = gt[0]; allele2 = gt[1];
                }

                // Intersection and validation
                if (modelSnps.has(rsid)) {
                    let m = modelSnps.get(rsid);
                    let valid_1 = (allele1 === m.A1 || allele1 === m.A2);
                    let valid_2 = (allele2 === m.A1 || allele2 === m.A2);

                    if (valid_1 && valid_2) {
                        validCount++;
                        let g = (allele1 === m.A1 ? 1 : 0) + (allele2 === m.A1 ? 1 : 0);
                        let y_val = (g * m.XFANCY) - m.XMEAN;
                        
                        W.push(m.PCs);
                        Y.push([y_val]);
                    }
                }
            }

            logStatus(`   -> Found ${validCount} valid, strand-aligned SNPs.`);
            if (validCount === 0) throw new Error("No valid SNPs found for projection.");

            // Step 3: Least Squares Regression
            logStatus("4. Solving Least Squares Regression...");
            
            // beta = (W^T * W)^-1 * W^T * Y
            const wMat = new Matrix(W);
            const yMat = new Matrix(Y);
            
            const wT = wMat.transpose();
            const wTw = wT.mmul(wMat);
            const wTwInv = inverse(wTw);
            const wTy = wT.mmul(yMat);
            const beta = wTwInv.mmul(wTy);

            // Apply EIGSCALE and SQRT(EIGVAL)
            const final_pcs = [];
            let outStr = [sampleName];

            for (let i = 0; i < beta.rows; i++) {
                let val = beta.get(i, 0) * eigscale[i] * Math.sqrt(eigvals[i]);
                final_pcs.push(val);
                outStr.push(val.toFixed(15));
            }

            logStatus("5. Projection complete!");
            
            // Show results
            const outputTextarea = document.getElementById('outputCoords');
            outputTextarea.value = outStr.join(',');
            document.getElementById('result-container').style.display = 'block';

        } catch (e) {
            logStatus(`\nERROR: ${e.message}`);
        } finally {
            processBtn.disabled = false;
        }
    }
</script>

</body>
</html>
