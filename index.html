<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N25 Projector</title>
    <!-- Load ml-matrix for Least Squares Regression -->
    <script src="https://cdn.jsdelivr.net/npm/ml-matrix@6.11.1/matrix.umd.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1, h2 { margin-top: 0; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        input[type="text"], input[type="file"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="number"] {
            width: 150px;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        
        .btn-secondary {
            background-color: #10b981;
            margin-top: 10px;
        }
        .btn-secondary:hover { background-color: #059669; }
        
        .btn-source {
            background-color: #4b5563;
            margin-right: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .btn-source:hover { background-color: #374151; }
        
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #e5e7eb;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
        }
        #result-container {
            display: none;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }
        #customSourceText {
            display: none;
            margin-bottom: 15px;
            height: 150px;
        }
        .source-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* Distance Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
        th {
            background-color: #f3f4f6;
            font-weight: bold;
        }
        .dist-badge {
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-family: monospace;
            display: inline-block;
            min-width: 60px;
            text-align: center;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.5);
        }
        .mode-selector {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>

<!-- PROJECTOR SECTION -->
<div class="card">
    <h1>N25 Projector</h1>
    
    <div class="form-group">
        <label for="sampleName">Sample Name:</label>
        <input type="text" id="sampleName" value="" placeholder="Enter sample name">
    </div>

    <div class="form-group">
        <label for="dnaFile">Upload Raw DNA File (Ancestry, MyHeritage, 23andMe):</label>
        <input type="file" id="dnaFile" accept=".txt,.csv">
    </div>

    <button id="processBtn" onclick="processData()">Process & Project</button>

    <div id="status"></div>

    <div id="result-container" style="display: block;">
        <label for="outputCoords">N25 / Vahaduo Coordinates (You can also paste existing ones here):</label>
        <textarea id="outputCoords" placeholder="Sample,0.01,0.02,0.03..."></textarea>
        <button class="btn-secondary" onclick="copyToClipboard('outputCoords', this)">Copy Coordinates</button>
    </div>
</div>

<!-- DISTANCE CALCULATOR SECTION -->
<div class="card">
    <h2>Distance Calculator</h2>
    <p>Find the closest populations to the coordinates in the text box above.</p>
    
    <div class="form-group">
        <label>Reference Type:</label>
        <div class="radio-group mode-selector">
            <label><input type="radio" name="distMode" value="pop" checked onchange="toggleCustomSource()"> Populations (Averages)</label>
            <label><input type="radio" name="distMode" value="ind" onchange="toggleCustomSource()"> Individuals</label>
        </div>

        <label>Select Category:</label>
        <div class="radio-group">
            <label><input type="radio" name="distCategory" value="modern" checked onchange="toggleCustomSource()"> Modern</label>
            <label><input type="radio" name="distCategory" value="ancient" onchange="toggleCustomSource()"> Non-Modern</label>
            <label><input type="radio" name="distCategory" value="all" onchange="toggleCustomSource()"> All</label>
            <label><input type="radio" name="distCategory" value="custom" onchange="toggleCustomSource()"> Custom</label>
        </div>
        <textarea id="customSourceText" placeholder="Paste custom reference coordinates here..."></textarea>
    </div>

    <div class="form-group">
        <label for="topN">Top N Distances:</label>
        <input type="number" id="topN" value="25" min="1" max="500">
    </div>

    <button onclick="calculateDistances(this)">Calculate Distances</button>

    <div id="distanceResults"></div>
</div>

<!-- SOURCE COORDINATES SECTION -->
<div class="card">
    <h2>Calculator Sources</h2>
    <p>Copy reference files to paste into the Vahaduo Source tab.</p>
    
    <label style="font-size: 14px; margin-bottom: 5px; color: #4b5563;">Population Averages (min 5 samples):</label>
    <div class="source-buttons" style="margin-bottom: 20px;">
        <button class="btn-source" onclick="fetchAndCopy('modern_populations.csv', this)">Modern Populations</button>
        <button class="btn-source" onclick="fetchAndCopy('non_modern_populations.csv', this)">Non-Modern Populations</button>
        <button class="btn-source" onclick="fetchAndCopy('populations.csv', this)">All Populations</button>
    </div>

    <label style="font-size: 14px; margin-bottom: 5px; color: #4b5563;">Individual Samples:</label>
    <div class="source-buttons">
        <button class="btn-source" onclick="fetchAndCopy('modern_only.csv', this)">Modern Individuals</button>
        <button class="btn-source" onclick="fetchAndCopy('non_modern_only.csv', this)">Non-Modern Individuals</button>
        <button class="btn-source" onclick="fetchAndCopy('my_calculator_source.csv', this)">All Individuals</button>
    </div>
</div>

<script>
    const { Matrix, inverse } = mlMatrix;

    // --- UTILITY FUNCTIONS ---
    
    async function fetchAndCopy(filename, button) {
        const originalText = button.textContent;
        button.textContent = "Fetching...";
        button.disabled = true;

        try {
            const response = await fetch(filename);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            
            await navigator.clipboard.writeText(text);
            button.textContent = "Copied!";
            button.style.backgroundColor = "#10b981"; 
        } catch (e) {
            alert(`Failed to fetch ${filename}: ${e.message}`);
            button.textContent = "Error";
            button.style.backgroundColor = "#ef4444"; 
        } finally {
            setTimeout(() => {
                button.textContent = originalText;
                button.disabled = false;
                button.style.backgroundColor = ""; 
            }, 2000);
        }
    }

    function copyToClipboard(elementId, button) {
        const copyText = document.getElementById(elementId);
        copyText.select();
        copyText.setSelectionRange(0, 99999); 
        
        navigator.clipboard.writeText(copyText.value).then(() => {
            const originalText = button.textContent;
            button.textContent = "Copied!";
            setTimeout(() => button.textContent = originalText, 2000);
        }).catch(err => {
            alert("Failed to copy text: " + err);
        });
    }

    // --- DISTANCE CALCULATOR LOGIC ---

    function toggleCustomSource() {
        const cat = document.querySelector('input[name="distCategory"]:checked').value;
        const customArea = document.getElementById('customSourceText');
        customArea.style.display = (cat === 'custom') ? 'block' : 'none';
    }

    function getEuclideanDistance(arr1, arr2) {
        let sum = 0;
        const len = Math.min(arr1.length, arr2.length);
        for (let i = 0; i < len; i++) {
            sum += Math.pow(arr1[i] - arr2[i], 2);
        }
        return Math.sqrt(sum);
    }

    function getGnYlRdColor(val) {
        if (val <= 0.1) {
            let ratio = val / 0.1;
            let hue = 120 - (ratio * 60);
            return `hsl(${hue}, 80%, 45%)`;
        } else if (val <= 0.5) {
            let ratio = (val - 0.1) / 0.4;
            let hue = 60 - (ratio * 60);
            return `hsl(${hue}, 80%, 45%)`;
        } else {
            return `hsl(0, 80%, 45%)`;
        }
    }

    async function calculateDistances(btn) {
        const coordsText = document.getElementById('outputCoords').value.trim();
        if (!coordsText) {
            alert("Please project a file or paste coordinates into the text box first.");
            return;
        }

        const userLine = coordsText.split(/\r?\n/)[0].split(',');
        const userCoords = userLine.slice(1).map(Number);

        if (userCoords.length < 2 || isNaN(userCoords[0])) {
            alert("Invalid coordinates format.");
            return;
        }

        const mode = document.querySelector('input[name="distMode"]:checked').value;
        const category = document.querySelector('input[name="distCategory"]:checked').value;
        const topN = parseInt(document.getElementById('topN').value) || 25;
        const resultsDiv = document.getElementById('distanceResults');

        let sourceFile = "";
        if (category !== 'custom') {
            if (mode === 'ind') {
                if (category === 'modern') sourceFile = 'modern_only.csv';
                else if (category === 'ancient') sourceFile = 'non_modern_only.csv';
                else sourceFile = 'my_calculator_source.csv';
            } else {
                if (category === 'modern') sourceFile = 'modern_populations.csv';
                else if (category === 'ancient') sourceFile = 'non_modern_populations.csv';
                else sourceFile = 'populations.csv';
            }
        }

        btn.disabled = true;
        btn.textContent = "Calculating...";

        try {
            let text = "";
            if (category === 'custom') {
                text = document.getElementById('customSourceText').value;
                if (!text.trim()) throw new Error("Custom source text is empty.");
            } else {
                const response = await fetch(sourceFile);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                text = await response.text();
            }

            const lines = text.split(/\r?\n/);
            const distances = [];

            for (let line of lines) {
                if (!line.trim()) continue;
                const parts = line.split(',');
                const popName = parts[0];
                const popCoords = parts.slice(1).map(Number);

                if (popCoords.length === userCoords.length && !isNaN(popCoords[0])) {
                    const dist = getEuclideanDistance(userCoords, popCoords);
                    distances.push({ name: popName, distance: dist });
                }
            }

            distances.sort((a, b) => a.distance - b.distance);
            const topResults = distances.slice(0, topN);

            if (topResults.length === 0) {
                resultsDiv.innerHTML = "<p>No matching coordinate lengths found in source file.</p>";
                return;
            }

            let html = `<table><thead><tr><th style="width: 50px;">#</th><th>Distance</th><th>${mode === 'ind' ? 'Individual' : 'Population'}</th></tr></thead><tbody>`;
            topResults.forEach((res, index) => {
                const color = getGnYlRdColor(res.distance);
                html += `<tr><td>${index + 1}</td><td><span class="dist-badge" style="background-color: ${color};">${res.distance.toFixed(4)}</span></td><td>${res.name}</td></tr>`;
            });
            html += `</tbody></table>`;
            resultsDiv.innerHTML = html;

        } catch (e) {
            alert(`Error: ${e.message}`);
        } finally {
            btn.disabled = false;
            btn.textContent = "Calculate Distances";
        }
    }

    // --- PROJECTION LOGIC ---

    function logStatus(msg) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = 'block';
        statusDiv.textContent += msg + '\n';
    }

    function clearStatus() {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = '';
        statusDiv.style.display = 'none';
        document.getElementById('distanceResults').innerHTML = ''; 
    }

    async function loadModel() {
        logStatus("1. Loading model from loadings.tsv...");
        try {
            const response = await fetch('loadings.tsv');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const text = await response.text();
            const lines = text.split(/\r?\n/);
            const headers = lines[0].split('\t');
            const pcIndices = [];
            headers.forEach((h, i) => { if (h.startsWith('PC')) pcIndices.push(i); });
            let eigscale = [], eigvals = [];
            const modelSnps = new Map();
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split('\t');
                const id = cols[0];
                const pcs = pcIndices.map(idx => parseFloat(cols[idx]));
                if (id === 'EIGSCALE') eigscale = pcs;
                else if (id === 'EIGVAL') eigvals = pcs;
                else {
                    modelSnps.set(id, {
                        A1: cols[headers.indexOf('A1')],
                        A2: cols[headers.indexOf('A2')],
                        XMEAN: parseFloat(cols[headers.indexOf('XMEAN')]),
                        XFANCY: parseFloat(cols[headers.indexOf('XFANCY')]),
                        PCs: pcs
                    });
                }
            }
            return { modelSnps, eigscale, eigvals };
        } catch (e) { throw e; }
    }

    async function processData() {
        const fileInput = document.getElementById('dnaFile');
        const sampleName = document.getElementById('sampleName').value.trim() || 'Sample';
        const processBtn = document.getElementById('processBtn');
        if (!fileInput.files.length) { alert("Please select a DNA file first."); return; }
        clearStatus();
        processBtn.disabled = true;
        try {
            const { modelSnps, eigscale, eigvals } = await loadModel();
            logStatus(`2. Loading DNA data...`);
            const dnaText = await fileInput.files[0].text();
            const dnaLines = dnaText.split(/\r?\n/);
            let isMyHeritage = false, isAncestry = false, is23andMe = false;
            let delimiter = '\t', dataStartIndex = 0, headerTokens = [];
            for (let i = 0; i < dnaLines.length; i++) {
                let line = dnaLines[i].trim();
                if (!line || line.startsWith('#')) continue;
                let headerLine = line.replace(/"/g, '').toUpperCase();
                if (headerLine.includes('RESULT')) { isMyHeritage = true; delimiter = ','; } 
                else {
                    delimiter = '\t';
                    headerTokens = headerLine.split(delimiter);
                    if (headerTokens.length >= 5) isAncestry = true;
                    else if (headerTokens.length === 4) is23andMe = true;
                }
                headerTokens = headerLine.split(delimiter);
                dataStartIndex = i + 1;
                break;
            }
            let rsidIdx = 0, a1Idx = -1, a2Idx = -1, resultIdx = -1, genotypeIdx = -1;
            if (isMyHeritage) { rsidIdx = headerTokens.indexOf('RSID'); resultIdx = headerTokens.indexOf('RESULT'); }
            else if (isAncestry) { rsidIdx = 0; a1Idx = 3; a2Idx = 4; }
            else if (is23andMe) { rsidIdx = 0; genotypeIdx = 3; }

            logStatus("3. Intersecting SNPs...");
            const W = [], Y = [];
            for (let i = dataStartIndex; i < dnaLines.length; i++) {
                let line = dnaLines[i].trim();
                if (!line) continue;
                let cols = line.replace(/"/g, '').split(delimiter);
                let rsid = cols[rsidIdx], allele1 = '', allele2 = '';
                if (isMyHeritage) { let res = cols[resultIdx]; if (res?.length === 2) { allele1 = res[0]; allele2 = res[1]; } }
                else if (isAncestry) { allele1 = cols[a1Idx]; allele2 = cols[a2Idx]; }
                else if (is23andMe) { let gt = cols[genotypeIdx]; if (gt?.length === 2) { allele1 = gt[0]; allele2 = gt[1]; } }
                if (modelSnps.has(rsid)) {
                    let m = modelSnps.get(rsid);
                    if ((allele1 === m.A1 || allele1 === m.A2) && (allele2 === m.A1 || allele2 === m.A2)) {
                        let g = (allele1 === m.A1 ? 1 : 0) + (allele2 === m.A1 ? 1 : 0);
                        W.push(m.PCs);
                        Y.push([(g * m.XFANCY) - m.XMEAN]);
                    }
                }
            }
            logStatus(`4. Solving Regression (${W.length} SNPs)...`);
            const wMat = new Matrix(W), yMat = new Matrix(Y);
            const wT = wMat.transpose();
            const beta = inverse(wT.mmul(wMat)).mmul(wT.mmul(yMat));
            let outStr = [sampleName];
            for (let i = 0; i < beta.rows; i++) {
                outStr.push((beta.get(i, 0) * eigscale[i] * Math.sqrt(eigvals[i])).toFixed(15));
            }
            document.getElementById('outputCoords').value = outStr.join(',');
            logStatus("5. Complete!");
            document.getElementById('distanceResults').scrollIntoView({ behavior: 'smooth' });
        } catch (e) { logStatus(`ERROR: ${e.message}`); } finally { processBtn.disabled = false; }
    }
</script>

</body>
</html>
